version: '3.8'

services:
  # ----------------------------
  # 1. 資料庫 (PostgreSQL)
  # ----------------------------
  postgres:
    image: postgres:15-alpine
    container_name: sm_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: smart_market
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 資料庫管理介面 (pgAdmin) - 讓你在網頁上看資料庫
  pgadmin:
    image: dpage/pgadmin4
    container_name: sm_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # ----------------------------
  # 2. 圖片儲存 (MinIO - 模擬 S3)
  # ----------------------------
  minio:
    image: minio/minio
    container_name: sm_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    ports:
      - "9000:9000" # API Port (程式連這個)
      - "9001:9001" # Web Console (瀏覽器看這個)
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
  pgadmin_data: