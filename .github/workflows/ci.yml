name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ─────────────────────────────────────────────
  # 1. Shared package — TypeScript type check
  # ─────────────────────────────────────────────
  shared-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./shared
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build shared (compile to dist/)
        run: npm run build
      - name: TypeScript type check
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────
  # 2. Backend — type check + build
  # ─────────────────────────────────────────────
  backend-check:
    needs: shared-build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install shared dependencies
        working-directory: ./shared
        run: npm ci
      - name: Build shared (required for runtime imports)
        working-directory: ./shared
        run: npm run build
      - name: Install backend dependencies
        run: npm ci
      - name: Build (NestJS compile)
        run: npm run build

  # ─────────────────────────────────────────────
  # 3. Frontend Client — unit tests + build
  # ─────────────────────────────────────────────
  client-check:
    needs: shared-build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend-client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install shared dependencies
        working-directory: ./shared
        run: npm ci
      - name: Install frontend-client dependencies
        run: npm ci
      - name: Nuxt prepare
        run: npm run postinstall
      - name: Unit tests
        run: npm run test:unit
      - name: Build (type check included)
        run: npm run build
        env:
          NITRO_PRESET: node

  # ─────────────────────────────────────────────
  # 4. Frontend Admin — type check + unit tests + build
  # ─────────────────────────────────────────────
  admin-check:
    needs: shared-build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend-admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install shared dependencies
        working-directory: ./shared
        run: npm ci
      - name: Install frontend-admin dependencies
        run: npm ci
      - name: TypeScript type check
        run: npm run type-check
      - name: Unit tests
        run: npm run test:unit
      - name: Build
        run: npm run build-only
