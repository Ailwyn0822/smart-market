name: CI Check

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  # 1. 檢查後端 (Backend)
  backend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Backend Placeholder Check
        run: echo "Backend structure is ready for NestJS!"

  # 2. 檢查前台 (Frontend Client)
  client-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend-client
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Frontend Placeholder Check
        run: echo "Client structure is ready for Nuxt 4!"

  # ==========================================
  # 3. [新增] 檢查後台 (Frontend Admin)
  # ==========================================
  admin-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend-admin # 指定在 admin 資料夾執行
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      # 雖然只是 echo，但為了之後跑 npm install，Node 環境還是要裝一下比較保險
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Admin Placeholder Check
        run: echo "Admin structure is ready for Vue 3!"