name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ─────────────────────────────────────────────
  # 0. 偵測哪些路徑有變更
  # ─────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      shared:  ${{ steps.filter.outputs.shared }}
      backend: ${{ steps.filter.outputs.backend }}
      client:  ${{ steps.filter.outputs.client }}
      admin:   ${{ steps.filter.outputs.admin }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared:
              - 'shared/**'
              - 'package.json'
              - 'package-lock.json'
            backend:
              - 'backend/**'
              - 'shared/**'
              - 'package.json'
              - 'package-lock.json'
            client:
              - 'frontend-client/**'
              - 'shared/**'
              - 'package.json'
              - 'package-lock.json'
            admin:
              - 'frontend-admin/**'
              - 'shared/**'
              - 'package.json'
              - 'package-lock.json'

  # ─────────────────────────────────────────────
  # 1. Shared package — build（只改 shared 時獨立檢查）
  # ─────────────────────────────────────────────
  shared-check:
    needs: changes
    if: ${{ needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      # build 本身就是 tsc，已含 type check
      - name: Build shared
        run: npm run build -w shared

  # ─────────────────────────────────────────────
  # 2. Backend — type check + build
  # ─────────────────────────────────────────────
  backend-check:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build shared
        run: npm run build -w shared
      - name: Build Backend (NestJS compile)
        run: npm run build -w backend

  # ─────────────────────────────────────────────
  # 3. Frontend Client — unit tests + build
  # ─────────────────────────────────────────────
  client-check:
    needs: changes
    if: ${{ needs.changes.outputs.client == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build shared
        run: npm run build -w shared
      - name: Unit tests
        run: npm run test:unit -w frontend-client
      - name: Build (type check included)
        run: npm run build -w frontend-client
        env:
          NITRO_PRESET: node
          NODE_OPTIONS: --max-old-space-size=4096

  # ─────────────────────────────────────────────
  # 4. Frontend Admin — type check + unit tests + build
  # ─────────────────────────────────────────────
  admin-check:
    needs: changes
    if: ${{ needs.changes.outputs.admin == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build shared
        run: npm run build -w shared
      - name: TypeScript type check
        run: npm run type-check -w frontend-admin
      - name: Unit tests
        run: npm run test:unit -w frontend-admin -- --run
      - name: Build
        run: npm run build-only -w frontend-admin
