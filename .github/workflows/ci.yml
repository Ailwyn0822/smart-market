name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ─────────────────────────────────────────────
  # 1. Shared package — TypeScript type check + build
  # ─────────────────────────────────────────────
  shared-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      # build 本身就是 tsc，已含 type check
      - name: Build shared
        run: npm run build -w shared
      # 把 shared/dist 傳給後續 job，避免重複 build
      - name: Upload shared build artifact
        uses: actions/upload-artifact@v4
        with:
          name: shared-dist
          path: shared/dist/
          retention-days: 1

  # ─────────────────────────────────────────────
  # 2. Backend — type check + build
  # ─────────────────────────────────────────────
  backend-check:
    needs: shared-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Download shared build artifact
        uses: actions/download-artifact@v4
        with:
          name: shared-dist
          path: shared/dist/
      - name: Build Backend (NestJS compile)
        run: npm run build -w backend

  # ─────────────────────────────────────────────
  # 3. Frontend Client — unit tests + build
  # ─────────────────────────────────────────────
  client-check:
    needs: shared-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Download shared build artifact
        uses: actions/download-artifact@v4
        with:
          name: shared-dist
          path: shared/dist/
      - name: Unit tests
        run: npm run test:unit -w frontend-client
      - name: Build (type check included)
        run: npm run build -w frontend-client
        env:
          NITRO_PRESET: node
          NODE_OPTIONS: --max-old-space-size=4096

  # ─────────────────────────────────────────────
  # 4. Frontend Admin — type check + unit tests + build
  # ─────────────────────────────────────────────
  admin-check:
    needs: shared-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Download shared build artifact
        uses: actions/download-artifact@v4
        with:
          name: shared-dist
          path: shared/dist/
      - name: TypeScript type check
        run: npm run type-check -w frontend-admin
      - name: Unit tests
        run: npm run test:unit -w frontend-admin -- --run
      - name: Build
        run: npm run build-only -w frontend-admin
