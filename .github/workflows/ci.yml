name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ─────────────────────────────────────────────
  # 1. Shared package — TypeScript type check
  # ─────────────────────────────────────────────
  shared-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build shared
        run: npm run build -w shared
      - name: TypeScript type check
        run: npm run type-check -w shared --if-present || npx tsc --noEmit -p shared/tsconfig.json

  # ─────────────────────────────────────────────
  # 2. Backend — type check + build
  # ─────────────────────────────────────────────
  backend-check:
    needs: shared-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build shared (required for runtime imports)
        run: npm run build -w shared
      - name: Build Backend (NestJS compile)
        run: npm run build -w backend

  # ─────────────────────────────────────────────
  # 3. Frontend Client — unit tests + build
  # ─────────────────────────────────────────────
  client-check:
    needs: shared-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build shared
        run: npm run build -w shared
      - name: Unit tests
        run: npm run test:unit -w frontend-client
      - name: Build (type check included)
        run: npm run build -w frontend-client
        env:
          NITRO_PRESET: node

  # ─────────────────────────────────────────────
  # 4. Frontend Admin — type check + unit tests + build
  # ─────────────────────────────────────────────
  admin-check:
    needs: shared-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build shared
        run: npm run build -w shared
      - name: TypeScript type check
        run: npm run type-check -w frontend-admin
      - name: Unit tests
        run: npm run test:unit -w frontend-admin
      - name: Build
        run: npm run build-only -w frontend-admin
