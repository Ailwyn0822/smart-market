name: Deploy to GCP

on:
  workflow_run:
    workflows: ["CI"]
    branches: [master]
    types: [completed]

jobs:
  deploy:
    name: Build → Push to GHCR → Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      packages: write  # 允許 push 到 GHCR

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      # 偵測哪些服務有變更
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'shared/**'
              - 'package.json'
              - 'package-lock.json'
              - 'Dockerfile.backend'
            client:
              - 'frontend-client/**'
              - 'shared/**'
              - 'package.json'
              - 'package-lock.json'
              - 'Dockerfile.client'
            admin:
              - 'frontend-admin/**'
              - 'shared/**'
              - 'package.json'
              - 'package-lock.json'
              - 'Dockerfile.admin'

      # 啟用 BuildKit（支援 cache-from/cache-to）
      - uses: docker/setup-buildx-action@v3

      # 登入 GHCR（用 GITHUB_TOKEN，不需額外 secret）
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR 要求全小寫，github.repository_owner 可能含大寫
      - name: Set lowercase image names
        id: images
        run: |
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "backend=ghcr.io/${OWNER}/smart-market-backend:latest"       >> $GITHUB_OUTPUT
          echo "backend_cache=ghcr.io/${OWNER}/smart-market-backend:cache"  >> $GITHUB_OUTPUT
          echo "client=ghcr.io/${OWNER}/smart-market-client:latest"         >> $GITHUB_OUTPUT
          echo "client_cache=ghcr.io/${OWNER}/smart-market-client:cache"    >> $GITHUB_OUTPUT
          echo "admin=ghcr.io/${OWNER}/smart-market-admin:latest"           >> $GITHUB_OUTPUT
          echo "admin_cache=ghcr.io/${OWNER}/smart-market-admin:cache"      >> $GITHUB_OUTPUT

      # 檢查 GHCR 上的 image 是否已存在（初次部署時全部不存在，要強制 build）
      - name: Check images exist in GHCR
        id: image_check
        run: |
          check() {
            docker manifest inspect "$1" > /dev/null 2>&1 && echo "true" || echo "false"
          }
          echo "backend=$(check ${{ steps.images.outputs.backend }})" >> $GITHUB_OUTPUT
          echo "client=$(check ${{ steps.images.outputs.client }})"   >> $GITHUB_OUTPUT
          echo "admin=$(check ${{ steps.images.outputs.admin }})"     >> $GITHUB_OUTPUT

      # ── Backend ──────────────────────────────
      - name: Build & Push backend
        if: steps.filter.outputs.backend == 'true' || steps.image_check.outputs.backend == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: ${{ steps.images.outputs.backend }}
          cache-from: type=registry,ref=${{ steps.images.outputs.backend_cache }}
          cache-to: type=registry,ref=${{ steps.images.outputs.backend_cache }},mode=max

      # ── Admin ────────────────────────────────
      - name: Build & Push admin
        if: steps.filter.outputs.admin == 'true' || steps.image_check.outputs.admin == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.admin
          push: true
          tags: ${{ steps.images.outputs.admin }}
          build-args: |
            VITE_API_BASE=https://panda-map.com/api
          cache-from: type=registry,ref=${{ steps.images.outputs.admin_cache }}
          cache-to: type=registry,ref=${{ steps.images.outputs.admin_cache }},mode=max

      # ── Client（最慢，放最後）────────────────
      - name: Build & Push client
        if: steps.filter.outputs.client == 'true' || steps.image_check.outputs.client == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.client
          push: true
          tags: ${{ steps.images.outputs.client }}
          cache-from: type=registry,ref=${{ steps.images.outputs.client_cache }}
          cache-to: type=registry,ref=${{ steps.images.outputs.client_cache }},mode=max

      # ── VM 只負責 pull + up ───────────────────
      - name: 部署到 GCP VM
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          command_timeout: 10m
          envs: GHCR_TOKEN,GHCR_USER
          script: |
            set -e

            # 若目錄不存在則先 clone（VM 重建時自動處理）
            if [ ! -d ~/smart-market ]; then
              git clone git@github.com:ailwyn0822/smart-market.git ~/smart-market
            fi

            cd ~/smart-market

            # 拉最新設定檔（nginx.conf、docker-compose.prod.yml 等）
            git fetch origin master
            git reset --hard origin/master

            # 登入 GHCR 才能 pull private image
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # DB schema 遷移（冪等，安全可重複執行）
            docker compose -f docker-compose.prod.yml up -d postgres
            sleep 3
            docker exec sm_db psql -U postgres -d smart_market \
              -c "ALTER TYPE orders_status_enum ADD VALUE IF NOT EXISTS 'pending_payment' BEFORE 'processing';" || true

            # Pull 最新 image 並重啟
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d

            # 清理舊 image
            docker image prune -f

            # 重啟 nginx
            docker compose -f docker-compose.prod.yml restart nginx

            echo "✅ 部署完成！"
