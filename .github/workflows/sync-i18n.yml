name: Sync i18n from Google Sheets

on:
  workflow_dispatch:

jobs:
  sync-i18n:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Write Google credentials
        run: |
          mkdir -p frontend-client/google
          echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > frontend-client/google/smart-market-485510-49b9dbb94ff8.json

      - name: Sync i18n from Google Sheets
        run: npm run lang -w frontend-client

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend-client/i18n/language/
          git diff --cached --quiet && echo "No changes, skipping commit." || (
            git commit -m "chore: sync i18n from Google Sheets" &&
            git push
          )
