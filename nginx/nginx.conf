events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    client_max_body_size 20M;

    # ----------------------------------------
    # HTTP → HTTPS redirect
    # ----------------------------------------
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ----------------------------------------
    # HTTPS 主要服務
    # ----------------------------------------
    server {
        listen 443 ssl;
        server_name panda-map.com;

        ssl_certificate     /etc/letsencrypt/live/panda-map.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/panda-map.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # ----------------------------------------
        # 前台 (Nuxt SSR)
        # ----------------------------------------
        location / {
            proxy_pass         http://sm_client:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ----------------------------------------
        # 後端 API（/api/ 前綴，Nginx 自動去掉 /api）
        # ----------------------------------------
        location /api/ {
            proxy_pass         http://sm_backend:8080/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ----------------------------------------
        # WebSocket (Socket.io)
        # ----------------------------------------
        location /socket.io/ {
            proxy_pass         http://sm_backend:8080/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
        }

        # ----------------------------------------
        # 後台管理 (Vue SPA，/admin/ 路徑)
        # ----------------------------------------
        location /admin/ {
            proxy_pass         http://sm_admin:80/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ----------------------------------------
        # MinIO 圖片存取
        # ----------------------------------------
        location /minio/ {
            proxy_pass         http://sm_minio:9000/;
            proxy_http_version 1.1;
            proxy_set_header   Host              sm_minio:9000;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }
    }
}
