events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    client_max_body_size 20M;

    # Gzip 壓縮：減少傳輸體積
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css text/javascript application/javascript application/json application/x-javascript text/xml application/xml image/svg+xml;

    # ----------------------------------------
    # HTTP → HTTPS redirect
    # ----------------------------------------
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ----------------------------------------
    # HTTPS 主要服務
    # ----------------------------------------
    server {
        listen 443 ssl http2;
        server_name panda-map.com;

        ssl_certificate     /etc/letsencrypt/live/panda-map.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/panda-map.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # ----------------------------------------
        # 前台 (Nuxt SSR)
        # ----------------------------------------
        location / {
            proxy_pass         http://sm_client:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ----------------------------------------
        # Nuxt icon server route（必須在 /api/ 之前，否則會被導到 NestJS）
        # @nuxt/icon 在 Nuxt server 建立 /api/_nuxt_icon/ endpoint
        # ----------------------------------------
        location /api/_nuxt_icon/ {
            proxy_pass         http://sm_client:3000/api/_nuxt_icon/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ----------------------------------------
        # SSE（Server-Sent Events）— 需要長連線，必須在 /api/ 前面
        # ----------------------------------------
        location /api/notifications/stream {
            proxy_pass         http://sm_backend:8080/notifications/stream;
            proxy_http_version 1.1;
            proxy_set_header   Connection         "";
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_read_timeout 3600s;
            proxy_buffering    off;
            proxy_cache        off;
        }

        # ----------------------------------------
        # 後端 API（/api/ 前綴，Nginx 自動去掉 /api）
        # ----------------------------------------
        location /api/ {
            proxy_pass         http://sm_backend:8080/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ----------------------------------------
        # WebSocket (Socket.io)
        # ----------------------------------------
        location /socket.io/ {
            proxy_pass         http://sm_backend:8080/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade         $http_upgrade;
            proxy_set_header   Connection      "upgrade";
            proxy_set_header   Host            $host;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_buffering    off;
        }

        # ----------------------------------------
        # 後台管理 (Vue SPA，/admin/ 路徑)
        # ----------------------------------------
        location /admin/ {
            proxy_pass         http://sm_admin:80/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ----------------------------------------
        # MinIO 圖片存取
        # ----------------------------------------
        location /minio/ {
            proxy_pass         http://minio:9000/;
            proxy_http_version 1.1;
            proxy_set_header   Host              minio:9000;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }
    }
}
