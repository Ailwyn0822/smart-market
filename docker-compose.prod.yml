services:
  # ----------------------------
  # 1. 資料庫 (PostgreSQL)
  # ----------------------------
  postgres:
    image: postgres:15-alpine
    container_name: sm_db
    restart: always
    env_file: .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sm_network

  # ----------------------------
  # 2. 圖片儲存 (MinIO)
  # ----------------------------
  minio:
    image: minio/minio
    container_name: sm_minio
    restart: always
    command: server /data --console-address ":9001"
    env_file: .env.prod
    volumes:
      - minio_data:/data
    networks:
      - sm_network

  # ----------------------------
  # 3. 後端 API (NestJS)
  # ----------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: sm_backend
    restart: always
    env_file: .env.prod
    depends_on:
      - postgres
      - minio
    networks:
      - sm_network

  # ----------------------------
  # 4. 前台 (Nuxt SSR)
  # ----------------------------
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: sm_client
    restart: always
    env_file: .env.prod
    networks:
      - sm_network

  # ----------------------------
  # 5. 後台管理 (Vue SPA)
  # ----------------------------
  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8080}
    container_name: sm_admin
    restart: always
    networks:
      - sm_network

  # ----------------------------
  # 6. 反向代理 (Nginx)
  # ----------------------------
  nginx:
    image: nginx:alpine
    container_name: sm_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - client
      - admin
      - minio
    networks:
      - sm_network

volumes:
  postgres_data:
  minio_data:

networks:
  sm_network:
    driver: bridge
